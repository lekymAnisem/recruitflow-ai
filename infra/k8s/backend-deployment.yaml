apiVersion: apps/v1
kind: Deployment
metadata:
  name: recruitflow-backend
  labels:
    app: recruitflow-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recruitflow-backend
  template:
    metadata:
      labels:
        app: recruitflow-backend
    spec:
      containers:
        - name: backend
          image: dracoo23/recruitflow-backend:latest
      imagePullPolicy: Always

          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: recruitflow-config
            - secretRef:
                name: recruitflow-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: uploads
          emptyDir: {}
