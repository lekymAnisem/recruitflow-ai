apiVersion: apps/v1
kind: Deployment
metadata:
  name: recruitflow-frontend
  namespace: recruitflow
  labels:
    app: recruitflow-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recruitflow-frontend
  template:
    metadata:
      labels:
        app: recruitflow-frontend
    spec:
      containers:
        - name: frontend
          image: FRONTEND_IMAGE_PLACEHOLDER
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
