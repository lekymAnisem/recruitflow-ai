apiVersion: v1
kind: ConfigMap
metadata:
  name: recruitflow-config
  namespace: recruitflow
data:
  NODE_ENV: production
  PORT: "5000"
  AWS_REGION: ap-southeast-2
  JWT_ACCESS_EXPIRY: 15m
  JWT_REFRESH_EXPIRY: 7d
  JWT_ISSUER: recruitflow-ai
  CORS_ORIGIN: https://recruitflow.example.com
  # MONGO_URI is set via Secret or external secret store in production
