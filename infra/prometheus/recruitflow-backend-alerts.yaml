groups:
  - name: recruitflow-backend
    rules:
      - alert: RecruitFlowBackendDown
        expr: absent(process_start_time_seconds{app="recruitflow-backend"})
        for: 2m
        labels:
          severity: critical
          service: recruitflow-backend
        annotations:
          summary: RecruitFlow backend is down
          description: Prometheus has not been able to scrape any RecruitFlow backend targets for 2 minutes.

      - alert: RecruitFlowBackendHighErrorRate
        expr: |
          sum(rate(http_requests_total{app="recruitflow-backend",status_code=~"5.."}[5m]))
          /
          clamp_min(sum(rate(http_requests_total{app="recruitflow-backend"}[5m])), 0.001) > 0.05
        for: 5m
        labels:
          severity: warning
          service: recruitflow-backend
        annotations:
          summary: RecruitFlow backend 5xx error rate is high
          description: More than 5% of backend requests are returning 5xx responses for 5 minutes.

      - alert: RecruitFlowBackendHighLatency
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(http_request_duration_seconds_bucket{app="recruitflow-backend"}[5m]))
          ) > 1
        for: 10m
        labels:
          severity: warning
          service: recruitflow-backend
        annotations:
          summary: RecruitFlow backend p95 latency is high
          description: Backend p95 request latency has been above 1 second for 10 minutes.
